  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

gin:0 0 32px;font-size:13px;color:#6A6A6B;break-inside:avoid\">\n    <b style=\"color:#333333\">Änderungen gegenüber v1:<\u002Fb> Typografie umgestellt (statt Inter): Überschriften in Space Grotesk (H1 600, H2 700), Inter Tight für Fließtext — Righteous nur für den mido-Schriftzug (separates mido-Brandbook); Farbwerte auf den Stand des freigegebenen Homepage-Mockups aktualisiert (Anthrazit #333333, Akzent-Orange #FF8A33, Link-Orange #E5710F). Neu: tokenisierte Farbskala gray-0…900 / orange-400…700, Grautöne von 13 auf 9 konsolidiert.\n  <\u002Fdiv>\n\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-0.01em;font-size:20px;margin:0 0 14px;padding-bottom:8px;border-bottom:2px solid #333333\">1. Markenlogo<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:14px;break-inside:avoid\">\n    <div>\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;margin-bottom:6px\">Primärlogo (Header)<\u002Fdiv>\n      <ul style=\"margin:0;padding-left:18px;color:#6A6A6B;font-size:13px\">\n        <li>Datei: src/assets/brand/teraport-logo.png<\u002Fli>\n        <li>Quellmaße 480 × 120 px, einfarbig Grau, transparent<\u002Fli>\n        <li>Darstellung im Header: 240 × 60 px (2×-Auslieferung, Retina)<\u002Fli>\n        <li>Platzierung links in der Kopfleiste, verlinkt auf Startseite<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;margin-bottom:6px\">Invertiertes Logo (Footer)<\u002Fdiv>\n      <ul style=\"margin:0;padding-left:18px;color:#6A6A6B;font-size:13px\">\n        <li>Datei: TP_340_trans_white.png (weiß)<\u002Fli>\n        <li>Einsatz ausschließlich auf dunklen Flächen (Footer, Anthrazit)<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <ul style=\"margin:0 0 32px;padding-left:18px;color:#6A6A6B;font-size:13px\">\n    <li>Keine Neueinfärbung per CSS-Filter — immer die passende Logodatei verwenden<\u002Fli>\n    <li>Nicht verzerren; Seitenverhältnis 4:1 beibehalten<\u002Fli>\n    <li>Auf Weiß/hellen Flächen graues Primärlogo; auf Anthrazit weiße Variante<\u002Fli>\n    <li>Schutzraum: mindestens halbe Logohöhe umlaufend<\u002Fli>\n    <li>Vergrößerung über 60 px Anzeigehöhe nur mit höher aufgelöster Quelldatei (Quellhöhe ≥ 2 × Anzeigehöhe)<\u002Fli>\n  <\u002Ful>\n\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-0.01em;font-size:20px;margin:0 0 6px;padding-bottom:8px;border-bottom:2px solid #333333;break-after:avoid\">2. Farbpalette<\u002Fh2>\n  <p style=\"margin:0 0 14px;font-size:13px;color:#6A6A6B\">Grundprinzip: viel Hellgrau, Grau und Anthrazit — Orange nur als sparsamer Akzent. Alle Töne tragen Tokens nach dem Muster <b style=\"color:#333333;font-family:'Space Grotesk',sans-serif\">gray-0…900<\u002Fb> bzw. <b style=\"color:#333333;font-family:'Space Grotesk',sans-serif\">orange-400…700<\u002Fb>: die Zahl entspricht dem Dunkelheitsgrad (0 = Weiß, 900 = Anthrazit). Die drei Kernrollen behalten sprechende Aliasse: Ink (gray-900), Graphite (gray-600), Silver (gray-500).<\u002Fp>\n\n  <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;margin:0 0 8px\">Grauskala<\u002Fdiv>\n  <div style=\"display:flex;border-radius:10px;overflow:hidden;border:1px solid #D2D2D2;margin:0 0 12px;break-inside:avoid\">\n    <sc-for list=\"{{ grayRamp }}\" as=\"g\" hint-placeholder-count=\"9\">\n      <div style=\"flex:1;height:66px;background:{{ g.hex }};display:flex;flex-direction:column;justify-content:flex-end;padding:7px 8px;font-family:'Space Grotesk',sans-serif;font-size:10px;line-height:1.35;color:{{ g.labelColor }}\"><b>{{ g.num }}<\u002Fb>{{ g.hex }}<\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <sc-raw-table style=\"width:100%;border-collapse:collapse;font-size:12.5px;margin:0 0 22px\">\n    <sc-raw-thead>\n      <sc-raw-tr style=\"text-align:left;font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#9C9D9F\">\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Token<\u002Fsc-raw-th>\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Alias<\u002Fsc-raw-th>\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Hex<\u002Fsc-raw-th>\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Verwendung<\u002Fsc-raw-th>\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Ersetzt (v1/Mockup)<\u002Fsc-raw-th>\n      <\u002Fsc-raw-tr>\n    <\u002Fsc-raw-thead>\n    <sc-raw-tbody>\n      <sc-for list=\"{{ grays }}\" as=\"c\" hint-placeholder-count=\"9\">\n        <sc-raw-tr>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #D2D2D2;white-space:nowrap\"><span style=\"display:inline-flex;align-items:center;gap:8px\"><span style=\"width:16px;height:16px;border-radius:4px;border:1px solid rgba(0,0,0,.15);background:{{ c.hex }}\"><\u002Fspan><b style=\"font-family:'Space Grotesk',sans-serif\">{{ c.token }}<\u002Fb><\u002Fspan><\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #D2D2D2;white-space:nowrap\">{{ c.alias }}<\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #D2D2D2;font-family:'Space Grotesk',sans-serif;white-space:nowrap\">{{ c.hex }}<\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #D2D2D2;color:#6A6A6B\">{{ c.use }}<\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #D2D2D2;color:#9C9D9F;font-family:'Space Grotesk',sans-serif\">{{ c.replaces }}<\u002Fsc-raw-td>\n        <\u002Fsc-raw-tr>\n      <\u002Fsc-for>\n    <\u002Fsc-raw-tbody>\n  <\u002Fsc-raw-table>\n\n  <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;margin:0 0 8px\">Orange-Skala<\u002Fdiv>\n  <div style=\"display:flex;border-radius:10px;overflow:hidden;border:1px solid #D2D2D2;margin:0 0 12px;max-width:420px;break-inside:avoid\">\n    <sc-for list=\"{{ oranges }}\" as=\"o\" hint-placeholder-count=\"3\">\n      <div style=\"flex:1;height:66px;background:{{ o.hex }};display:flex;flex-direction:column;justify-content:flex-end;padding:7px 8px;font-family:'Space Grotesk',sans-serif;font-size:10px;line-height:1.35;color:{{ o.labelColor }}\"><b>{{ o.num }}<\u002Fb>{{ o.hex }}<\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <sc-raw-table style=\"width:100%;border-collapse:collapse;font-size:12.5px;margin:0 0 12px\">\n    <sc-raw-thead>\n      <sc-raw-tr style=\"text-align:left;font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#9C9D9F\">\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Token<\u002Fsc-raw-th>\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Alias<\u002Fsc-raw-th>\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Hex<\u002Fsc-raw-th>\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Verwendung<\u002Fsc-raw-th>\n      <\u002Fsc-raw-tr>\n    <\u002Fsc-raw-thead>\n    <sc-raw-tbody>\n      <sc-for list=\"{{ oranges }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <sc-raw-tr>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #D2D2D2;white-space:nowrap\"><span style=\"display:inline-flex;align-items:center;gap:8px\"><span style=\"width:16px;height:16px;border-radius:4px;border:1px solid rgba(0,0,0,.15);background:{{ c.hex }}\"><\u002Fspan><b style=\"font-family:'Space Grotesk',sans-serif\">{{ c.token }}<\u002Fb><\u002Fspan><\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #D2D2D2;white-space:nowrap\">{{ c.alias }}<\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #D2D2D2;font-family:'Space Grotesk',sans-serif;white-space:nowrap\">{{ c.hex }}<\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #D2D2D2;color:#6A6A6B\">{{ c.use }}<\u002Fsc-raw-td>\n        <\u002Fsc-raw-tr>\n      <\u002Fsc-for>\n    <\u002Fsc-raw-tbody>\n  <\u002Fsc-raw-table>\n  <div style=\"background:#F2F2F2;border:1px solid #E2E2E2;border-radius:10px;padding:12px 18px;margin:0 0 12px;font-size:13px;color:#6A6A6B;break-inside:avoid\">\n    <b style=\"color:#333333\">Konsolidierung:<\u002Fb> vier Near-Duplikate entfallen — #E2E2E2 → gray-300, #C4C4C5 &amp; #B8B8B9 → gray-400, #7A7A7B → gray-600, #2E2C2D → gray-900. CSS-Variablen folgen dem Token: <span style=\"font-family:'Space Grotesk',sans-serif\">--tp-gray-600<\u002Fspan>, <span style=\"font-family:'Space Grotesk',sans-serif\">--tp-orange-500<\u002Fspan> usw.\n  <\u002Fdiv>\n  <div style=\"background:#F2F2F2;border:1px solid #E2E2E2;border-radius:10px;padding:12px 18px;margin:0 0 32px;font-size:13px;color:#6A6A6B;break-inside:avoid\">\n    <b style=\"color:#333333\">Dosierungs-Regel:<\u002Fb> Orange ist Signalfarbe. Pro Ansicht ein Primär-Button, dazu punktuelle Akzente (Links, Haken). Große Flächen niemals orange.\n  <\u002Fdiv>\n\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-0.01em;font-size:20px;margin:0 0 6px;padding-bottom:8px;border-bottom:2px solid #333333;break-after:avoid\">3. Typografie<\u002Fh2>\n  <p style=\"margin:0 0 14px;font-size:13px;color:#6A6A6B\">Zwei Schriftfamilien: <b style=\"color:#333333\">Space Grotesk<\u002Fb> (alle Überschriften, Kicker, Navigation, Buttons, Links, Zahlen/Hex — --tp-font-accent) und <b style=\"color:#333333\">Inter Tight<\u002Fb> (Fließtext). Righteous ist ausschließlich dem mido-Schriftzug vorbehalten und wird im separaten mido-Brandbook gepflegt. Alle Fonts lokal gebündelt via @fontsource — kein CDN/Google Fonts (DSGVO). Fallback: system-ui, \"Segoe UI\", Roboto, sans-serif.<\u002Fp>\n  <sc-raw-table style=\"width:100%;border-collapse:collapse;font-size:12.5px;margin:0 0 14px\">\n    <sc-raw-thead>\n      <sc-raw-tr style=\"text-align:left;font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#9C9D9F\">\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Ebene<\u002Fsc-raw-th>\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Schnitt<\u002Fsc-raw-th>\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Farbe<\u002Fsc-raw-th>\n        <sc-raw-th style=\"padding:6px 8px;border-bottom:1px solid #D2D2D2;font-weight:600\">Merkmale<\u002Fsc-raw-th>\n      <\u002Fsc-raw-tr>\n    <\u002Fsc-raw-thead>\n    <sc-raw-tbody>\n      <sc-for list=\"{{ typo }}\" as=\"t\" hint-placeholder-count=\"6\">\n        <sc-raw-tr>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #E2E2E2;white-space:nowrap\"><b>{{ t.level }}<\u002Fb><\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #E2E2E2;white-space:nowrap\">{{ t.cut }}<\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #E2E2E2;font-family:'Space Grotesk',sans-serif;white-space:nowrap\">{{ t.color }}<\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:7px 8px;border-bottom:1px solid #E2E2E2;color:#6A6A6B\">{{ t.traits }}<\u002Fsc-raw-td>\n        <\u002Fsc-raw-tr>\n      <\u002Fsc-for>\n    <\u002Fsc-raw-tbody>\n  <\u002Fsc-raw-table>\n  <div style=\"border:1px solid #E2E2E2;border-radius:10px;padding:18px 20px;margin:0 0 14px;break-inside:avoid\">\n    <div style=\"font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#9C9D9F;margin-bottom:10px\">Muster · Kicker Space Grotesk 600 · H1 Space Grotesk 600<\u002Fdiv>\n    <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:24px;line-height:1.15;letter-spacing:-0.01em;margin-bottom:8px\">Präzision von der ersten CAD-Datei an.<\u002Fdiv>\n    <p style=\"margin:0;color:#6A6A6B\">Fließtext in Inter Tight 400 — Werkzeugkosten, Machbarkeit und 3D-Analyse, automatisiert und nachvollziehbar direkt aus dem CAD-Modell.<\u002Fp>\n  <\u002Fdiv>\n  <ul style=\"margin:0 0 32px;padding-left:18px;color:#6A6A6B;font-size:13px\">\n    <li>Produktnamen immer kleingeschrieben: mido, veo, toolkit, connect (nie „veoCAST“; „DMU-Toolkit“/„DMU.Connect“ nur als einmalige Herkunftsnennung)<\u002Fli>\n    <li>Kicker/Datumszeilen in Versalien, Sperrung 0.06–0.14 em, Space Grotesk 600<\u002Fli>\n    <li>Righteous ist kein Website-Font: ausschließlich für den mido-Schriftzug reserviert (Pflege im separaten mido-Brandbook)<\u002Fli>\n  <\u002Ful>\n\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-0.01em;font-size:20px;margin:0 0 14px;padding-bottom:8px;border-bottom:2px solid #333333;break-after:avoid\">4. Komponenten<\u002Fh2>\n\n  <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;margin:0 0 8px\">Buttons<\u002Fdiv>\n  <div style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:#333333;border-radius:10px;padding:18px 20px;margin:0 0 10px;break-inside:avoid\">\n    <span style=\"background:#FF8A33;color:#333333;font-weight:600;font-size:14px;padding:12px 22px;border-radius:9px;font-family:'Space Grotesk',sans-serif\">Kontakt aufnehmen<\u002Fspan>\n    <span style=\"border:1px solid rgba(255,255,255,.28);color:#F2F2F2;font-weight:500;font-size:14px;padding:12px 22px;border-radius:9px;font-family:'Space Grotesk',sans-serif\">Produkte ansehen<\u002Fspan>\n    <span style=\"background:#333333;color:#fff;border:1px solid rgba(255,255,255,.25);font-weight:600;font-size:14px;padding:12px 22px;border-radius:7px;font-family:'Space Grotesk',sans-serif\">Kontakt (Navigation)<\u002Fspan>\n  <\u002Fdiv>\n  <ul style=\"margin:0 0 22px;padding-left:18px;color:#6A6A6B;font-size:13px\">\n    <li>Primär: orange-400, Schrift gray-900 (Ink), Radius 9 px, Space Grotesk 600<\u002Fli>\n    <li>Sekundär: transparent, 1 px Rahmen rgba(255,255,255,.28), helle Schrift — nur auf dunklen Flächen<\u002Fli>\n    <li>Navigation „Kontakt“: gray-900 (Ink) mit weißer Schrift, Radius 7 px — bewusst nicht orange<\u002Fli>\n    <li>Beide Hero-Buttons teilen exakt gleiche Höhe/Innenabstände (gemeinsame .btn-Basis)<\u002Fli>\n  <\u002Ful>\n\n  <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;margin:0 0 8px\">Karten<\u002Fdiv>\n  <ul style=\"margin:0 0 22px;padding-left:18px;color:#6A6A6B;font-size:13px\">\n    <li>Weiß, Radius 14 px, Rahmen rgba(0,0,0,.05), Schatten 0 1px 3px rgba(0,0,0,.08); Hover: Rahmen Orange + stärkerer Schatten<\u002Fli>\n    <li>Produkt-Karten: Name Space Grotesk 700 in gray-900, Teaser gray-600, „Mehr erfahren →“ orange-500; Desktop 4 nebeneinander (Raster min. 230 px)<\u002Fli>\n    <li>News-Karten: Bildfenster 176 px hoch (object-fit cover), Datum in Versalien gray-500, Titel Space Grotesk 600 in gray-900<\u002Fli>\n  <\u002Ful>\n\n  <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;margin:0 0 8px\">Header &amp; Footer<\u002Fdiv>\n  <ul style=\"margin:0 0 22px;padding-left:18px;color:#6A6A6B;font-size:13px\">\n    <li>Header: gray-200, 1 px Unterkante gray-300; Navigation: Produkte-Dropdown (mido, veo, toolkit, connect) · Services · Unternehmen · News · Kontakt · Sprachumschalter DE/EN (Ghost-Pill, Rahmen gray-400)<\u002Fli>\n    <li>Footer: gray-900 (Ink), weißes Logo, Rechtliches; Text gray-400, Copyright gray-600<\u002Fli>\n  <\u002Ful>\n\n  <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;margin:0 0 8px\">Hero (Startseite)<\u002Fdiv>\n  <ul style=\"margin:0 0 32px;padding-left:18px;color:#6A6A6B;font-size:13px\">\n    <li>Flächig gray-900 (kein Verlauf); Kicker gray-500 (Versalien), H1 Space Grotesk 600 in gray-100 (clamp 2–3.25 rem, Zeilenhöhe 1.08), Subline gray-400<\u002Fli>\n    <li>Bildfenster rechts: Passepartout 5:4 (500 × 400), Radius 12 px, beschneidet jede Grafik per object-fit cover<\u002Fli>\n  <\u002Ful>\n\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-0.01em;font-size:20px;margin:0 0 14px;padding-bottom:8px;border-bottom:2px solid #333333;break-after:avoid\">5. Bildsprache &amp; Grundsätze<\u002Fh2>\n  <ul style=\"margin:0 0 36px;padding-left:18px;color:#6A6A6B;font-size:13px\">\n    <li>News-Beitragsbilder: Original-WordPress-Bilder unter public/assets/uploads/…; Karten beschneiden auf das Bildfenster<\u002Fli>\n    <li>Produkt-/Hero-Grafiken: technische 3D-CAD-Screenshots bevorzugt, ruhiger Hintergrund<\u002Fli>\n    <li>DSGVO: keine externen Ressourcen (Fonts, Tracker, CDN) — Space Grotesk und Inter Tight lokal ausliefern<\u002Fli>\n    <li>Barrierefreiheit: orange-500 nur für kurze, fette Linktexte; in Fließtext orange-700 (AA-Kontrast auf Weiß). Schrift auf Orange immer gray-900, nie Weiß<\u002Fli>\n    <li>Zweisprachigkeit: jede Seite existiert in DE (ohne Präfix) und EN (/en/…); der Sprachumschalter führt stets zum exakten Gegenstück<\u002Fli>\n  <\u002Ful>\n\n  <p style=\"margin:0;font-size:11px;color:#9C9D9F;border-top:1px solid #E2E2E2;padding-top:12px\">Teraport GmbH · Brandbook Website v2 · erstellt am 12.07.2026 · abgeleitet aus „Teraport Homepage – Schema D“ (Mockup) · Referenzdateien: src/styles/global.css, src/components/*.astro<\u002Fp>\n\n<\u002Fdiv>\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      grayRamp: [\n        { num: 'gray-0',   hex: '#FFFFFF', labelColor: '#333333' },\n        { num: 'gray-50',  hex: '#F7F7F7', labelColor: '#333333' },\n
